name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install black

      - name: Lint code
        run: black .

      - name: Run application
        # Run main.py and save standard output to a file
        run: python main.py > output.log

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: app-output
          path: output.log
