name: Cache Python Packages

on:
  push:
    branches:
      - main

jobs:
  cache-packages:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - run: python -m pip install --upgrade pip

      - run: |
          mkdir -p downloaded_packages
          pip download -r requirements.txt -d downloaded_packages

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git show-ref --verify --quiet refs/heads/packages-cache; then
            git checkout packages-cache
          else
            git checkout -b packages-cache
          fi

          mkdir -p downloaded_packages

          git add downloaded_packages/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update downloaded packages cache"
            git push origin packages-cache
          fi
